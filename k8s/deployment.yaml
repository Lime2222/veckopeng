apiVersion: apps/v1
kind: Deployment
metadata:
  name: veckopeng-app
  namespace: veckopeng
  labels:
    app: veckopeng
    component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: veckopeng
      component: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: veckopeng
        component: app
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: ghcr.io/GITHUB_USER/veckopeng:latest  # Replace GITHUB_USER
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: veckopeng-config
          env:
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: veckopeng-secret
                  key: DB_PASS
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /index.php
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /index.php
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veckopeng-postgres
  namespace: veckopeng
  labels:
    app: veckopeng
    component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: veckopeng
      component: postgres
  template:
    metadata:
      labels:
        app: veckopeng
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "veckopeng"
            - name: POSTGRES_USER
              value: "veckopeng"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: veckopeng-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "veckopeng"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: veckopeng
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
