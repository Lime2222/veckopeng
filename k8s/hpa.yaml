apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: veckopeng-hpa
  namespace: veckopeng
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: veckopeng-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
