version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8080:80"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: veckopeng
      DB_USER: veckopeng
      DB_PASS: veckopeng_secret
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: veckopeng
      POSTGRES_USER: veckopeng
      POSTGRES_PASSWORD: veckopeng_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veckopeng"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
